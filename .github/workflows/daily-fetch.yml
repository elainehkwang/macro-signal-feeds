name: Daily Macro Feed Fetch

on:
  schedule:
    - cron: "0 22 * * *"   # 22:00 UTC = 6:00 AM HKT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install httpx
      - run: python scripts/generate_feeds.py
      - name: Commit & push
        run: |
          git config user.name "macro-signal-bot"
          git config user.email "bot@macro-signal-feeds.local"
          git add feeds/
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "auto: daily feed update $(date -u +%Y-%m-%d)"
            git push
          fi
