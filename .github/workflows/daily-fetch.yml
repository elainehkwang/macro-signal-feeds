name: Daily Macro Feed Fetch

on:
  schedule:
    # Runs daily at 22:00 UTC (6:00 AM HKT / 7:00 AM JST)
    - cron: "0 22 * * *"
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  fetch-feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Fetch X/Twitter feeds (Nitter RSS)
        run: python scripts/generate_x_feed.py
        continue-on-error: true

      - name: Fetch RSS/Substack feeds
        run: python scripts/generate_rss_feed.py
        continue-on-error: true

      - name: Fetch Podcast feeds
        run: python scripts/generate_podcast_feed.py
        continue-on-error: true

      - name: Commit & push updated feeds
        run: |
          git config user.name "macro-signal-bot"
          git config user.email "bot@macro-signal-feeds.local"
          git add feeds/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: daily feed update $(date -u +%Y-%m-%d)"
            git push
          fi
